on:
  workflow_dispatch:
    branches-ignore:
      - '**'
    tags:
      - 'v*'
  create:
    branches-ignore:
      - '**'
    tags:
      - 'v*'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build Release Archives
      run: |
        mkdir -p dist

        for variant in 17U 17UbyLxxca Lxxtzphone; do
          build_dir="dist/${variant}"
          archive="dist/magisk-module-nezha-lxxca-${variant}.zip"

          mkdir -p "${build_dir}"
          cp -R META-INF "${build_dir}/"
          cp -R "${variant}/." "${build_dir}/"

          (
            cd "${build_dir}"
            zip -r "../$(basename "${archive}")" .
          )
        done
    - name: Upload Release
      uses: ncipollo/release-action@v1
      with:
        allowUpdates: true
        artifacts: "dist/magisk-module-nezha-lxxca-17U.zip,dist/magisk-module-nezha-lxxca-17UbyLxxca.zip,dist/magisk-module-nezha-lxxca-Lxxtzphone.zip"
        token: ${{ secrets.GITHUB_TOKEN }}
